<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>導師進度匯報表（導師版）</title>
  <style>
    /* 全局設計參考：image_0.png 網頁視覺風 */
    body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
    
    /* 標題居中，使用深藍色 */
    h1 { font-size: 26px; text-align: center; color: #2c3e50; font-weight: bold; margin-bottom: 25px; }
    
    /* 白色卡片式設計，帶有陰影和圓角 */
    .card { background: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 25px; }
    
    /* 標籤設計，大寫並帶有特定深藍色 */
    label { display: block; font-weight: bold; font-size: 14px; color: #2c3e50; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    
    /* 下拉選單、文字方塊、輸入框樣式，背景使用極淺灰色，圓角設計 */
    select, textarea, input { 
      width: 100%; 
      padding: 12px 15px; 
      border: 1px solid #ddd; 
      border-radius: 8px; 
      box-sizing: border-box; 
      font-size: 16px; 
      background-color: #ebf0f1; 
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    select:focus, textarea:focus, input:focus {
      border-color: #3498db; 
      outline: none;
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2); 
    }
    textarea { height: 100px; resize: vertical; }
    
    /* 頂部選取區域網格佈局，兩欄排列 */
    .selection-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px 25px; }
    /* 功能選取在手機版佔滿全寬，電腦版在網格內 */
    .selection-full-width { grid-column: span 2; }
    /* 單個選取項目的容器 */
    .selection-cell { display: flex; flex-direction: column; }

    /* 填寫模式文字方塊網格佈局，兩欄排列 */
    .textarea-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 25px; }
    .textarea-cell { display: flex; flex-direction: column; }
    
    /* 查閱模式標題 */
    #readTitle { color: #2c3e50; font-size: 20px; font-weight: bold; margin-bottom: 15px; text-align: left; }
    
    /* 主按鈕設計，使用鮮豔藍色，全寬，圓角 */
    .action-btn { 
      width: 100%; 
      padding: 15px; 
      margin-top: 30px; 
      background-color: #3498db; 
      color: #ffffff; 
      border: none; 
      border-radius: 8px; 
      font-size: 18px; 
      font-weight: bold; 
      cursor: pointer; 
      transition: background 0.2s, transform 0.1s; 
    }
    .action-btn:hover { background-color: #2980b9; } 
    .action-btn:active { transform: scale(0.98); } 
    .action-btn:disabled { background-color: #95a5a6; cursor: not-allowed; }
    
    /* 查閱模式表格樣式，保持乾淨整潔 */
    .table-container { overflow-x: auto; margin-top: 15px; background-color: #ffffff; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; border: 1px solid #ddd; }
    th, td { border: 1px solid #ddd; padding: 12px 15px; text-align: left; font-size: 14px; }
    th { background-color: #f8f9fa; font-weight: bold; color: #2c3e50; border-bottom: 2px solid #ddd; }
    tr:last-child td { border-bottom: none; }
    .text-red { color: #e74c3c; font-weight: bold; }
    .text-grey { color: #95a5a6; }
    
    #loading { text-align: center; color: #7f8c8d; font-size: 16px; font-weight: bold; padding: 40px; }
  </style>
</head>
<body>

  <h1>&#128198; 導師進度匯報表（導師版）</h1>
  
  <div id="loading">系統載入中，請稍候... (從資料庫讀取中)</div>

  <div id="main-content" style="display: none;">
    <div class="card">
      <div class="selection-grid">
        <div class="selection-cell selection-full-width">
          <label>請選擇功能：</label>
          <select id="modeSelect" onchange="toggleMode()">
            <option value="write" selected>填寫課堂記錄</option>
            <option value="read">查閱課堂記錄</option>
          </select>
        </div>

        <div class="selection-cell">
          <label>導師名稱：</label>
          <select id="tutorSelect" onchange="onTutorChange()"><option value="">請選擇...</option></select>
        </div>

        <div class="selection-cell">
          <label>學校：</label>
          <select id="schoolSelect" onchange="onSchoolChange()" disabled><option value="">請先選擇導師...</option></select>
        </div>

        <div class="selection-cell">
          <label>課程：</label>
          <select id="courseSelect" onchange="onCourseChange()" disabled><option value="">請先選擇學校...</option></select>
        </div>
      </div>
    </div>

    <div id="writeSection" class="card">
      <label>課堂：</label>
      <select id="lessonSelect" disabled><option value="">請先選擇課程...</option></select>

      <div class="textarea-grid">
        <div class="textarea-cell">
          <label>課室情況</label>
          <textarea id="roomStatus"></textarea>
        </div>
        <div class="textarea-cell">
          <label>進度</label>
          <textarea id="progress"></textarea>
        </div>
        <div class="textarea-cell">
          <label>上課情況</label>
          <textarea id="classStatus"></textarea>
        </div>
        <div class="textarea-cell">
          <label>備注</label>
          <textarea id="remarks"></textarea>
        </div>
      </div>

      <button id="submitBtn" class="action-btn" onclick="submitData()">上傳課堂記錄</button>
    </div>

    <div id="readSection" class="card" style="display: none;">
      <h3 id="readTitle"></h3>
      <div class="table-container" id="tableContainer"></div>
    </div>
  </div>

  <script>
    // 已經幫你填好專屬的 Google Apps Script API 網址！
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx7-1RAg-kf5H5b8DC3do55daEHxcJvF2DXkrNoBNS4XKTalS9QNKjoYA7psZcDRmIE0Q/exec"; 
    
    let globalData = [];

    window.onload = function() {
      fetch(GAS_URL + "?action=getData")
        .then(response => response.json())
        .then(data => initApp(data))
        .catch(error => {
          document.getElementById('loading').innerText = "連線失敗，請稍後再試或聯絡管理員。";
          console.error('API Fetch Error:', error);
        });
    };

    function initApp(data) {
      globalData = data;
      document.getElementById('loading').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
      
      let tutors = new Set();
      data.forEach(row => {
        if(row.tutors) {
          row.tutors.split('/').forEach(t => tutors.add(t.trim()));
        }
      });
      
      const tutorSelect = document.getElementById('tutorSelect');
      Array.from(tutors).sort().forEach(t => {
        if(t) tutorSelect.innerHTML += `<option value="${t}">${t}</option>`;
      });
    }

    function toggleMode() {
      const mode = document.getElementById('modeSelect').value;
      if (mode === 'write') {
        document.getElementById('writeSection').style.display = 'block';
        document.getElementById('readSection').style.display = 'none';
        onCourseChange(); 
      } else {
        document.getElementById('writeSection').style.display = 'none';
        document.getElementById('readSection').style.display = 'block';
        onCourseChange(); 
      }
    }

    function onTutorChange() {
      const tutor = document.getElementById('tutorSelect').value;
      const schoolSelect = document.getElementById('schoolSelect');
      resetSelect(schoolSelect, '請選擇...');
      resetSelect(document.getElementById('courseSelect'), '請先選擇學校...');
      resetSelect(document.getElementById('lessonSelect'), '請先選擇課程...');
      document.getElementById('tableContainer').innerHTML = '';
      document.getElementById('readTitle').innerText = '';

      if (!tutor) { schoolSelect.disabled = true; return; }
      schoolSelect.disabled = false;

      let schools = new Set();
      globalData.forEach(row => {
        if (row.tutors.includes(tutor) && row.school) schools.add(row.school);
      });

      Array.from(schools).sort().forEach(s => schoolSelect.innerHTML += `<option value="${s}">${s}</option>`);
    }

    function onSchoolChange() {
      const tutor = document.getElementById('tutorSelect').value;
      const school = document.getElementById('schoolSelect').value;
      const courseSelect = document.getElementById('courseSelect');
      
      resetSelect(courseSelect, '請選擇...');
      resetSelect(document.getElementById('lessonSelect'), '請先選擇課程...');
      document.getElementById('tableContainer').innerHTML = '';
      document.getElementById('readTitle').innerText = '';

      if (!school) { courseSelect.disabled = true; return; }
      courseSelect.disabled = false;

      let courses = new Set();
      globalData.forEach(row => {
        if (row.tutors.includes(tutor) && row.school === school && row.courseName) {
          courses.add(row.courseName);
        }
      });

      Array.from(courses).sort().forEach(c => courseSelect.innerHTML += `<option value="${c}">${c}</option>`);
    }

    // 【修復完畢的函數】：不會再把課堂選單鎖死了
    function onCourseChange() {
      const tutor = document.getElementById('tutorSelect').value;
      const school = document.getElementById('schoolSelect').value;
      const course = document.getElementById('courseSelect').value;
      const mode = document.getElementById('modeSelect').value;
      const lessonSelect = document.getElementById('lessonSelect');

      if (!course) { 
        resetSelect(lessonSelect, '請先選擇課程...'); 
        return; 
      }

      const filteredData = globalData.filter(row => 
        row.tutors.includes(tutor) && row.school === school && row.courseName === course
      );

      if (mode === 'write') {
        // 手動清空並解鎖，不使用 resetSelect 避免被 disabled
        lessonSelect.innerHTML = `<option value="">請選擇課堂...</option>`;
        lessonSelect.disabled = false; 
        
        filteredData.forEach(row => {
          const label = `第${row.lessonNum}堂 - ${row.dateStr} - ${row.dayOfWeek}`;
          lessonSelect.innerHTML += `<option value="${row.rowNum}">${label}</option>`;
        });
      } else {
        renderTable(filteredData, school, course);
      }
    }

    function resetSelect(element, defaultText) {
      element.innerHTML = `<option value="">${defaultText}</option>`;
      element.disabled = true;
    }

    function parseDate(dateStr) {
      const match = dateStr.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
      if (match) return new Date(match[1], parseInt(match[2]) - 1, match[3]);
      return new Date(dateStr); 
    }

    function renderTable(data, school, course) {
      document.getElementById('readTitle').innerText = `${school} - ${course}`;
      
      let html = `<table>
                    <tr>
                      <th>課堂日期及堂數</th>
                      <th>課室情況</th>
                      <th>進度</th>
                      <th>上課情況</th>
                      <th>備注</th>
                    </tr>`;
      
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      data.forEach(row => {
        const rowDate = parseDate(row.dateStr);
        const isPast = rowDate < today; 
        const title = `第${row.lessonNum}堂<br>${row.dateStr}<br>${row.dayOfWeek}`;
        
        const getCellHtml = (content) => {
          if (content) return content;
          if (isPast) return `<span class="text-red">未填寫</span>`;
          return `<span class="text-grey">-</span>`;
        };

        html += `<tr>
                  <td>${title}</td>
                  <td>${getCellHtml(row.roomStatus)}</td>
                  <td>${getCellHtml(row.progress)}</td>
                  <td>${getCellHtml(row.classStatus)}</td>
                  <td>${getCellHtml(row.remarks)}</td>
                 </tr>`;
      });
      
      html += `</table>`;
      document.getElementById('tableContainer').innerHTML = html;
    }

    function submitData() {
      const rowNum = document.getElementById('lessonSelect').value;
      if (!rowNum) return alert('請先完整選擇要填寫的課堂！');

      const roomStatus = document.getElementById('roomStatus').value;
      const progress = document.getElementById('progress').value;
      const classStatus = document.getElementById('classStatus').value;
      const remarks = document.getElementById('remarks').value;

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerText = '上傳中...';

      const payload = {
        action: 'update',
        rowNum: rowNum,
        roomStatus: roomStatus,
        progress: progress,
        classStatus: classStatus,
        remarks: remarks
      };

      fetch(GAS_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify(payload)
      })
      .then(response => response.json())
      .then(result => {
        if (result.success) {
          alert('資料已成功上傳！');
          btn.disabled = false;
          btn.innerText = '上傳課堂記錄';
          
          document.getElementById('roomStatus').value = '';
          document.getElementById('progress').value = '';
          document.getElementById('classStatus').value = '';
          document.getElementById('remarks').value = '';

          const updatedRow = globalData.find(r => r.rowNum == rowNum);
          if(updatedRow) {
            updatedRow.roomStatus = roomStatus;
            updatedRow.progress = progress;
            updatedRow.classStatus = classStatus;
            updatedRow.remarks = remarks;
          }
        } else {
          throw new Error(result.error || "未知錯誤");
        }
      })
      .catch(error => {
        alert('上傳失敗：' + error.message);
        btn.disabled = false;
        btn.innerText = '上傳課堂記錄';
      });
    }
  </script>
</body>
</html>
